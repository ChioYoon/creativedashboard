log('=== 파이프라인 엔진 테스트 ===\n');

// 1. CSV 파싱 테스트
log('1. CSV 파싱 + 컬럼 정규화');
const parsed = plParseCSV(REAL_CSV_SAMPLE);
log('  - 헤더 수:', parsed.headers.length);
log('  - 행 수:', parsed.rows.length);
log('  - 정규화 맵:', JSON.stringify(parsed._renameMap));
log('  - 소재명 컬럼 있음?', parsed.headers.includes('소재명'));
log('  - 유형 컬럼 있음?', parsed.headers.includes('유형'));

// 2. BNR/VID 필터 테스트
const vidBnrRows = parsed.rows.filter(r => ['BNR','VID'].includes((r['유형']||'').toUpperCase()));
log('\n2. BNR/VID 필터');
log('  - 전체 행:', parsed.rows.length, '/ BNR+VID:', vidBnrRows.length);
vidBnrRows.forEach((r, i) => {
  log(`  [${i+1}] 소재명: "${r['소재명']}" | 유형: ${r['유형']} | 전환: ${r['전환']} | 노출수: ${r['노출수']}`);
});

// 3. 컬럼 탐지 테스트
log('\n3. 태그 컬럼 자동 탐지');
const detected = plDetectTagColumns(parsed.headers, parsed.rows);
log('  - 태그 컬럼:', detected.tagCols.join(', '));
log('  - 인사이트 컬럼:', detected.insightCols.join(', '));

// 4. 검증 테스트
log('\n4. 데이터 검증');
const validation = plValidateData(parsed);
log('  - 필수 컬럼 결과:', validation.colResult.score);
log('  - 누락 컬럼:', validation.colResult.missingRequired.join(', ') || '없음');
log('  - 데이터 품질:', validation.dataResult.score);
log('  - BNR+VID 수:', validation.dataResult.vidBnr);
log('  - 이슈:', validation.dataResult.issues.map(i => i.msg).join(' | ') || '없음');

// 5. Score 산출 테스트
log('\n5. Score 산출');
const params = { wConv: 40, wCpa: 35, wIpm: 25 };
const scored = plCalcScores(vidBnrRows, params, parsed.headers);
scored.forEach(c => {
  log(`  ${c.name} | 유형:${c.type} | 전환:${c.conversions} | Score:${c.score} | 등급:${c.grade} | 태그:${c.tags.slice(0,3).join(', ')}`);
});

log('\n=== 테스트 완료 ===');
