function calcScores(mats) {
  const n = mats.length;
  const sortedConv = [...mats].sort((a,b) => b.전환-a.전환);
  const sortedIPM  = [...mats].sort((a,b) => (b.전환/(b.노출수||1)*1000) - (a.전환/(a.노출수||1)*1000));
  const withCPA    = mats.filter(m => m.전환>0).sort((a,b) => (a.비용/a.전환)-(b.비용/b.전환));
  return mats.map(m => {
    const rC = sortedConv.indexOf(m);
    const rI = sortedIPM.indexOf(m);
    const rP = m.전환>0 ? withCPA.indexOf(m) : withCPA.length;
    const sC = ((n-rC)/n)*100, sI = ((n-rI)/n)*100, sP = ((n-rP)/n)*100;
    const CPA  = m.전환>0 ? Math.round(m.비용/m.전환) : 0;
    const IPM  = m.노출수>0 ? +(m.전환/m.노출수*1000).toFixed(3) : 0;
    return { ...m, TotalScore: sC*0.35+sP*0.35+sI*0.30, CPA, IPM, ROAS: 0 };
  });
}

async function runInsight(plan) {
  const resultEl = document.getElementById('result');
  resultEl.innerHTML = '<div class="card"><p>⏳ Gemini API 분석 중...</p></div>';

  GeminiKeyManager.setPlan(plan);
  const isPaid = (plan === 'paid');

  const scored  = calcScores(MATS);
  const sorted  = [...scored].sort((a,b) => b.TotalScore-a.TotalScore);
  const topN    = isPaid ? 5 : 3;
  const highPerf = sorted.slice(0, topN);
  const lowPerf  = sorted.slice(-topN).reverse();

  // 태그 컬럼 선별 (짧고 유효한 컬럼만)
  const tagCols = ['hooking','mechanic','emotion','visual'];

  const prompts  = GeminiPrompts.scoringInsight(highPerf, lowPerf, { tagCols, isPaid });
  const OUT_TOKENS = GeminiKeyManager.getMaxTokens();

  console.log('[테스트] splitMode:', prompts.splitMode, '| OUT_TOKENS:', OUT_TOKENS);
  console.log('[테스트] prompt1 길이:', prompts.prompt1.length, '자');
  console.log('[테스트] prompt1:\n', prompts.prompt1);

  let slots = {};

  try {
    if (prompts.splitMode === 'paid_2call') {
      const r1 = await callGeminiAPI(prompts.prompt1, { maxTokens: OUT_TOKENS });
      console.log('[1차응답]', r1);
      Object.assign(slots, parseScoringSlots(r1)||{});
      await new Promise(r=>setTimeout(r,1800));
      const r2 = await callGeminiAPI(prompts.prompt2, { maxTokens: OUT_TOKENS });
      console.log('[2차응답]', r2);
      Object.assign(slots, parseScoringSlots(r2)||{});
    } else {
      const r1 = await callGeminiAPI(prompts.prompt1, { maxTokens: OUT_TOKENS });
      console.log('[무료응답]', r1);
      Object.assign(slots, parseScoringSlots(r1)||{});
    }

    renderResult(slots, isPaid, highPerf, lowPerf, resultEl);

  } catch(err) {
    resultEl.innerHTML = `<div class="err">❌ ${err.message}</div>`;
  }
}

function renderResult(slots, isPaid, highPerf, lowPerf, el) {
  const planBadge = isPaid
    ? '<span style="background:#f5f3ff;color:#7c3aed;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">💎 유료 Pro</span>'
    : '<span style="background:#fffbeb;color:#d97706;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">🆓 무료</span>';

  const SLOT_DEFS = [
    { key:'winTags',    icon:'🏷️', title:'승리 패턴 태그',   color:'#10b981', bg:'#ecfdf5' },
    { key:'formatGap',  icon:'📊', title:'포맷별 성과 격차', color:'#3b82f6', bg:'#eff6ff' },
    { key:'lossReason', icon:'⚠️', title:'효율 하락 원인',   color:'#f59e0b', bg:'#fffbeb' },
    { key:'actionItems',icon:'⚡', title:'즉시 실행 액션',   color:'#8b5cf6', bg:'#f5f3ff' },
    { key:'scaleUp',    icon:'🚀', title:'스케일업 후보',    color:'#E8003D', bg:'#fff1f2' },
    { key:'stopNow',    icon:'🛑', title:'중단 권고',        color:'#6b7280', bg:'#f9fafb' },
  ];

  // _slotText와 동일한 마크다운 → HTML 변환
  const renderSlotVal = (v) => {
    if (!v) return '';
    let out = v;
    out = out.replace(/\\n/g, '\n');
    out = out.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    out = out.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
    const lines = out.split('\n');
    return lines.map((line, i) => {
      const t = line.trim();
      if (!t) return i === 0 ? '' : '<br>';
      if (/^[•\-▸▪◆]/.test(t)) return `<div class="gai-bullet">${t}</div>`;
      return (i > 0 ? '<br>' : '') + t;
    }).join('');
  };

  let slotHtml = '';
  SLOT_DEFS.forEach(d => {
    const v = slots[d.key];
    if (!v) return;
    slotHtml += `
      <div style="border-left:4px solid ${d.color};background:${d.bg};padding:14px 16px;border-radius:8px;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:${d.color};margin-bottom:8px;">${d.icon} ${d.title}</div>
        <div class="insight" style="background:transparent;border:none;padding:0;margin:0;font-size:13px;line-height:1.8;">${renderSlotVal(v)}</div>
      </div>`;
  });

  const topList = highPerf.map((m,i)=>
    `<span class="stat">#${i+1} ${m.소재명||m.key} (점:${m.TotalScore.toFixed(0)} 전환:${m.전환} IPM:${m.IPM.toFixed(2)})</span>`
  ).join('');
  const lowList = lowPerf.map((m,i)=>
    `<span class="stat">#↓${i+1} ${m.소재명||m.key} (점:${m.TotalScore.toFixed(0)} 전환:${m.전환})</span>`
  ).join('');

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:20px;">✨</span>
        <span style="font-size:16px;font-weight:700;">Gemini AI 인사이트 — PHPH_v5</span>
        ${planBadge}
      </div>
      <div class="label">📈 분석 대상 소재</div>
      <div style="margin-bottom:4px;"><b>고효율:</b> ${topList}</div>
      <div style="margin-bottom:16px;"><b>저효율:</b> ${lowList}</div>
      ${slotHtml || '<div class="warn">⚠️ 슬롯 파싱 실패 — 아래 원본 응답 확인</div>'}
      ${!isPaid ? buildUpgradeNudge() : ''}
    </div>`;
}

  return `
    <div style="margin-top:16px;border:1.5px dashed #d1d5db;border-radius:10px;padding:14px;background:#fafafa;">
      <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;">💎 유료 Pro로 업그레이드하면 추가 제공</div>
      ${['📊 포맷별 성과 격차','⚠️ 효율 하락 원인','⚡ 즉시 실행 액션','🚀 스케일업 후보','🛑 중단 권고'].map(l=>
        `<div style="font-size:12px;color:#9ca3af;text-decoration:line-through;padding:3px 0;">🔒 ${l}</div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  피로도 인사이트 실행
// ══════════════════════════════════════════════════════════════
async function runFatigueInsight(plan) {
  const resultEl = document.getElementById('fatigue-result');
  resultEl.innerHTML = '<div class="card"><p>⏳ Gemini API 피로도 분석 중...</p></div>';

  GeminiKeyManager.setPlan(plan);
  const isPaid = (plan === 'paid');

  const periods = {
    basePeriod:  '2026-03-01~03-31',
    compPeriod:  '2026-04-01~04-13',
  };

  const prompts = GeminiPrompts.fatigueInsight(FATIGUE_MOVERS, periods, { isPaid });
  const OUT_TOKENS = GeminiKeyManager.getFatigueTokens();

  console.log('[피로도테스트] splitMode:', prompts.splitMode, '| OUT_TOKENS:', OUT_TOKENS);
  console.log('[피로도테스트] prompt1 길이:', prompts.prompt1.length, '자');
  console.log('[피로도테스트] prompt1:\n', prompts.prompt1);

  let slots = {};

  try {
    if (prompts.splitMode === 'paid_2call') {
      const r1 = await callGeminiAPI(prompts.prompt1, { maxTokens: OUT_TOKENS });
      console.log('[피로도 1차응답]', r1.slice(0, 300));
      Object.assign(slots, parseFatigueSlots(r1) || {});
      await new Promise(r => setTimeout(r, 1800));
      const r2 = await callGeminiAPI(prompts.prompt2, { maxTokens: OUT_TOKENS });
      console.log('[피로도 2차응답]', r2.slice(0, 300));
      Object.assign(slots, parseFatigueSlots(r2) || {});
    } else {
      const r1 = await callGeminiAPI(prompts.prompt1, { maxTokens: OUT_TOKENS });
      console.log('[피로도 무료응답]', r1.slice(0, 400));
      Object.assign(slots, parseFatigueSlots(r1) || {});
    }

    renderFatigueResult(slots, isPaid, resultEl);

  } catch (err) {
    resultEl.innerHTML = `<div class="err">❌ ${err.message}</div>`;
  }
}

// ══════════════════════════════════════════════════════════════
//  피로도 결과 렌더러
// ══════════════════════════════════════════════════════════════
function renderFatigueResult(slots, isPaid, el) {
  const planBadge = isPaid
    ? '<span style="background:#f5f3ff;color:#7c3aed;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">💎 유료 Pro</span>'
    : '<span style="background:#fffbeb;color:#d97706;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">🆓 무료</span>';

  const SLOT_DEFS = [
    { key: 'riseReason',  icon: '📈', title: '급등 소재 원인',    color: '#10b981', bg: '#ecfdf5' },
    { key: 'fatigueDiag', icon: '📉', title: '피로도 진단',       color: '#ef4444', bg: '#fef2f2' },
    { key: 'swapTiming',  icon: '⏱️', title: '교체 타이밍 기준',  color: '#f59e0b', bg: '#fffbeb' },
    { key: 'opsAction',   icon: '🔄', title: '운영 액션',         color: '#8b5cf6', bg: '#f5f3ff' },
  ];

  // _slotText와 동일한 마크다운 → HTML 변환
  const renderSlotVal = (v) => {
    if (!v) return '';
    let out = v;
    out = out.replace(/\\n/g, '\n');
    out = out.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    out = out.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
    const lines = out.split('\n');
    return lines.map((line, i) => {
      const t = line.trim();
      if (!t) return i === 0 ? '' : '<br>';
      if (/^[•\-▸▪◆★]/.test(t)) return `<div class="gai-bullet">${t}</div>`;
      return (i > 0 ? '<br>' : '') + t;
    }).join('');
  };

  let slotHtml = '';
  SLOT_DEFS.forEach(d => {
    const v = slots[d.key];
    if (!v) return;
    slotHtml += `
      <div style="border-left:4px solid ${d.color};background:${d.bg};padding:14px 16px;border-radius:8px;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:${d.color};margin-bottom:8px;">${d.icon} ${d.title}</div>
        <div class="insight" style="background:transparent;border:none;padding:0;margin:0;font-size:13px;line-height:1.85;">${renderSlotVal(v)}</div>
      </div>`;
  });

  // 분석 데이터 요약 표
  const moverRows = FATIGUE_MOVERS.map(m => {
    const dir = m.rankChange > 0 ? `<span style="color:#10b981;">▲${m.rankChange}</span>` : `<span style="color:#ef4444;">▼${Math.abs(m.rankChange)}</span>`;
    const cpaColor = m.cpaChangeRate > 20 ? '#ef4444' : m.cpaChangeRate > 0 ? '#f59e0b' : '#10b981';
    const cpaSign  = m.cpaChangeRate > 0 ? '+' : '';
    const fatIcon  = m.fatigueStatus === 'tired' ? '🔴' : m.fatigueStatus === 'warning' ? '🟡' : '🟢';
    return `<tr style="border-bottom:1px solid #f1f5f9;">
      <td style="padding:5px 8px;font-size:12px;font-weight:600;">${dir}</td>
      <td style="padding:5px 8px;font-size:11px;color:#374151;">${m.key}</td>
      <td style="padding:5px 8px;font-size:11px;text-align:center;">${fatIcon} ${m.fatigueStatus}</td>
      <td style="padding:5px 8px;font-size:11px;text-align:right;color:${cpaColor};font-weight:700;">${cpaSign}${m.cpaChangeRate.toFixed(1)}%</td>
      <td style="padding:5px 8px;font-size:11px;text-align:right;">${m.baseCPA.toLocaleString()}→${m.compCPA.toLocaleString()}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:20px;">📉</span>
        <span style="font-size:16px;font-weight:700;">피로도 AI 인사이트 — PHPH_v5</span>
        ${planBadge}
      </div>

      <!-- 분석 데이터 요약 -->
      <div class="label">📋 분석 대상 소재 (순위 변동 기준)</div>
      <div style="overflow-x:auto;margin-bottom:16px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:#f8fafc;">
              <th style="padding:6px 8px;text-align:left;color:#64748b;font-weight:700;">순위변동</th>
              <th style="padding:6px 8px;text-align:left;color:#64748b;font-weight:700;">소재명</th>
              <th style="padding:6px 8px;text-align:center;color:#64748b;font-weight:700;">피로도</th>
              <th style="padding:6px 8px;text-align:right;color:#64748b;font-weight:700;">CPA변화율</th>
              <th style="padding:6px 8px;text-align:right;color:#64748b;font-weight:700;">CPA(기준→비교)</th>
            </tr>
          </thead>
          <tbody>${moverRows}</tbody>
        </table>
      </div>

      <!-- AI 인사이트 슬롯 -->
      ${slotHtml || '<div class="warn">⚠️ 슬롯 파싱 실패 — 콘솔 원본 응답 확인</div>'}
      ${!isPaid ? buildFatigueUpgradeNudge() : ''}
    </div>`;
}

function buildFatigueUpgradeNudge() {
  return `
    <div style="margin-top:16px;border:1.5px dashed #d1d5db;border-radius:10px;padding:14px;background:#fafafa;">
      <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;">💎 유료 Pro로 업그레이드하면 추가 제공</div>
      ${['📉 피로도 진단 (소재별 CPA 트렌드 상세)', '⏱️ 교체 타이밍 기준 (즉시/모니터링 분리)', '🔄 운영 액션 (ON·OFF·신소재 방향)'].map(l =>
        `<div style="font-size:12px;color:#9ca3af;text-decoration:line-through;padding:3px 0;">🔒 ${l}</div>`).join('')}
    </div>`;
}
