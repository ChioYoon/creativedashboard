<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHPH.csv 분석 테스트</title>
  <style>
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      padding: 30px;
      background: #f5f7fa;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #1a1a1a; margin-bottom: 20px; }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      background: #f9fafb;
      border-radius: 6px;
      border-left: 4px solid #0969da;
    }
    .result {
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .success { border-left: 3px solid #22c55e; }
    .error { border-left: 3px solid #ef4444; }
    .btn {
      padding: 10px 20px;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin: 5px;
    }
    .btn:hover { background: #0550ae; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔬 PHPH.csv 분석 기준 테스트</h1>
    
    <div class="test-section">
      <h3>1️⃣ CSV 로드 및 기본 분석</h3>
      <button class="btn" onclick="runTest1()">테스트 1 실행: 소재명 기준</button>
      <button class="btn" onclick="runTest2()">테스트 2 실행: 파일명 기준</button>
      <div id="result1" class="result"></div>
    </div>
    
    <div class="test-section">
      <h3>2️⃣ 컬럼 구조 확인</h3>
      <button class="btn" onclick="checkColumns()">컬럼 확인</button>
      <div id="result2" class="result"></div>
    </div>
    
    <div class="test-section">
      <h3>3️⃣ 집계 비교 (소재명 vs 파일명)</h3>
      <button class="btn" onclick="compareGroupBy()">비교 실행</button>
      <div id="result3" class="result"></div>
    </div>
  </div>

  <script src="js/pipeline-engine.js"></script>
  <script src="js/analysis-engine-v2.js"></script>
  <script>
    let rawData = null;
    
    async function loadCSV() {
      if (rawData) return rawData;
      
      try {
        const res = await fetch('sample_data/PHPH.csv');
        const text = await res.text();
        const parsed = plParseCSV(text);
        const normalized = plNormalizeColumns(parsed);
        rawData = normalized.rows;
        console.log('✅ CSV 로드 완료:', rawData.length, '개 행');
        return rawData;
      } catch (err) {
        console.error('❌ CSV 로드 실패:', err);
        return null;
      }
    }
    
    async function runTest1() {
      const result1 = document.getElementById('result1');
      result1.innerHTML = '<p>⏳ 테스트 1 실행 중...</p>';
      
      const rows = await loadCSV();
      if (!rows) {
        result1.innerHTML = '<p class="error">❌ CSV 로드 실패</p>';
        return;
      }
      
      const result = runStep1_Scoring(rows, { groupBy: '소재명' });
      
      let html = '<div class="success">';
      html += `<p><strong>✅ 테스트 1 완료: 소재명 기준</strong></p>`;
      html += `<p>• 총 소재 수: ${result.creatives.length}개</p>`;
      html += `<p>• 최고 점수: ${result.creatives[0]?.TotalScore || 0}</p>`;
      html += `<p>• 평균 점수: ${(result.creatives.reduce((s,c) => s + c.TotalScore, 0) / result.creatives.length).toFixed(1)}</p>`;
      html += `<p><strong>Top 3 소재:</strong></p>`;
      result.creatives.slice(0, 3).forEach((c, i) => {
        html += `<p>${i+1}. [${c.유형}] ${c.소재명.substring(0, 40)}... (점수: ${c.TotalScore})</p>`;
      });
      html += '</div>';
      
      result1.innerHTML = html;
    }
    
    async function runTest2() {
      const result1 = document.getElementById('result1');
      result1.innerHTML = '<p>⏳ 테스트 2 실행 중...</p>';
      
      const rows = await loadCSV();
      if (!rows) {
        result1.innerHTML = '<p class="error">❌ CSV 로드 실패</p>';
        return;
      }
      
      const result = runStep1_Scoring(rows, { groupBy: '파일명' });
      
      let html = '<div class="success">';
      html += `<p><strong>✅ 테스트 2 완료: 파일명 기준</strong></p>`;
      html += `<p>• 총 소재 수: ${result.creatives.length}개</p>`;
      html += `<p>• 최고 점수: ${result.creatives[0]?.TotalScore || 0}</p>`;
      html += `<p>• 평균 점수: ${(result.creatives.reduce((s,c) => s + c.TotalScore, 0) / result.creatives.length).toFixed(1)}</p>`;
      html += `<p><strong>Top 3 소재:</strong></p>`;
      result.creatives.slice(0, 3).forEach((c, i) => {
        html += `<p>${i+1}. [${c.유형}] ${c.파일명.substring(0, 40)}... (점수: ${c.TotalScore})</p>`;
      });
      html += '</div>';
      
      result1.innerHTML = html;
    }
    
    async function checkColumns() {
      const result2 = document.getElementById('result2');
      result2.innerHTML = '<p>⏳ 컬럼 확인 중...</p>';
      
      const rows = await loadCSV();
      if (!rows) {
        result2.innerHTML = '<p class="error">❌ CSV 로드 실패</p>';
        return;
      }
      
      // BNR/VID 행만 필터링
      const bnrVidRows = rows.filter(r => ['BNR', 'VID'].includes((r['유형'] || '').toUpperCase()));
      
      if (bnrVidRows.length === 0) {
        result2.innerHTML = '<p class="error">❌ BNR/VID 행을 찾을 수 없습니다</p>';
        return;
      }
      
      const sampleRow = bnrVidRows[0];
      const keys = Object.keys(sampleRow);
      
      let html = '<div class="success">';
      html += `<p><strong>✅ 컬럼 구조 확인 완료</strong></p>`;
      html += `<p>• 전체 행 수: ${rows.length}개</p>`;
      html += `<p>• BNR/VID 행 수: ${bnrVidRows.length}개</p>`;
      html += `<p>• 컬럼 수: ${keys.length}개</p>`;
      html += `<p><strong>주요 컬럼:</strong></p>`;
      html += `<p>- 유형: "${sampleRow['유형']}"</p>`;
      html += `<p>- 소재명: "${sampleRow['소재명']?.substring(0, 50)}..."</p>`;
      html += `<p>- 파일명: "${sampleRow['파일명']?.substring(0, 50)}..."</p>`;
      html += `<p>- 전환: ${sampleRow['전환']}</p>`;
      html += `<p>- 비용: ${sampleRow['비용']}</p>`;
      html += `<p><strong>모든 컬럼 (처음 20개):</strong></p>`;
      html += `<p style="font-size: 11px;">${keys.slice(0, 20).join(', ')}</p>`;
      html += '</div>';
      
      result2.innerHTML = html;
    }
    
    async function compareGroupBy() {
      const result3 = document.getElementById('result3');
      result3.innerHTML = '<p>⏳ 비교 실행 중...</p>';
      
      const rows = await loadCSV();
      if (!rows) {
        result3.innerHTML = '<p class="error">❌ CSV 로드 실패</p>';
        return;
      }
      
      const result1 = runStep1_Scoring(rows, { groupBy: '소재명' });
      const result2 = runStep1_Scoring(rows, { groupBy: '파일명' });
      
      let html = '<div class="success">';
      html += `<p><strong>✅ 집계 기준 비교 완료</strong></p>`;
      html += `<p><strong>📊 소재명 기준:</strong></p>`;
      html += `<p>• 총 소재 수: ${result1.creatives.length}개</p>`;
      html += `<p>• Top 1: ${result1.creatives[0]?.소재명.substring(0, 40)}... (${result1.creatives[0]?.TotalScore}점)</p>`;
      html += `<p><strong>📁 파일명 기준:</strong></p>`;
      html += `<p>• 총 소재 수: ${result2.creatives.length}개</p>`;
      html += `<p>• Top 1: ${result2.creatives[0]?.파일명.substring(0, 40)}... (${result2.creatives[0]?.TotalScore}점)</p>`;
      html += `<p><strong>🔍 차이점:</strong></p>`;
      html += `<p>• 소재 수 차이: ${Math.abs(result1.creatives.length - result2.creatives.length)}개</p>`;
      
      if (result1.creatives.length === result2.creatives.length) {
        html += `<p style="color: #f59e0b;">⚠️ 두 기준의 소재 수가 동일합니다. 데이터가 중복되었을 가능성이 있습니다.</p>`;
      } else {
        html += `<p style="color: #22c55e;">✅ 두 기준의 소재 수가 다릅니다. 정상적으로 작동 중입니다.</p>`;
      }
      
      html += '</div>';
      result3.innerHTML = html;
    }
    
    // 자동 실행
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 PHPH.csv 분석 테스트 페이지 준비 완료');
    });
  </script>
</body>
</html>
